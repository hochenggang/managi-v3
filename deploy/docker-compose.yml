# Managi v3 docker-compose
# 设计见 ../design-v3.md §8.2

services:
  managi:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: managi:v3
    container_name: managi
    # 跳板机场景推荐 network_mode: host；普通场景用端口映射
    ports:
      - "18001:18001"
    environment:
      - MANAGI_HOST=0.0.0.0
      - MANAGI_PORT=18001
      - MANAGI_INDEX_HTML=/app/index.html
      # 修复 B38：安全默认值——默认启用 BasicAuth，避免误暴露在公网成为开放跳板机
      # 首次启动前必须修改默认用户名/密码
      - MANAGI_BASICAUTH_ENABLED=true
      - MANAGI_BASICAUTH_USERNAME=admin
      - MANAGI_BASICAUTH_PASSWORD=changeme
      - MANAGI_SSH_TIMEOUT=15
      - MANAGI_KEEPALIVE=30
    restart: unless-stopped
    # 修复 B38：容器硬化——只读根文件系统、最小权限、禁用特权升级
    read_only: true
    tmpfs:
      - /tmp:size=64m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 512m
    pids_limit: 200
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:18001/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    # 跳板机需要访问内网 SSH，使用 host 网络更合适：
    # network_mode: host
