# Managi v3 CI: push/PR 触发的 lint + test + build 验证

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-test-go:
    name: Go Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: '1.22'
          cache-dependency-path: backend/go.sum
      - name: Go vet
        run: go vet ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          working-directory: backend
          version: v2.6
          args: --timeout=3m
      - name: Go test
        run: go test ./...

  build-go:
    name: Go Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: '1.22'
          cache-dependency-path: backend/go.sum
      - name: Build
        run: CGO_ENABLED=0 GOOS=linux go build -ldflags="-s -w" -o /tmp/managi ./cmd/managi
      - name: Check binary size
        run: ls -lh /tmp/managi

  build-frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        run: npm ci
      - name: Type check
        run: npm run type-check
      - name: Unit tests
        run: npm run test
      - name: Build
        run: npm run build
      - name: Verify single HTML
        run: ls -lh dist/index.html

  build-tauri:
    name: Tauri Build (windows-latest)
    runs-on: windows-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v5
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.22'
          cache-dependency-path: backend/go.sum
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      # Tauri 的 build.rs（tauri_build::build()）在编译期校验 externalBin 路径，
      # 需预先构建 Go sidecar 到 binaries/managi-x86_64-pc-windows-msvc.exe。
      - name: Build Go sidecar binary
        working-directory: backend
        shell: bash
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: 0
        run: |
          mkdir -p ../desktop/src-tauri/binaries
          go build -ldflags="-s -w" -o "../desktop/src-tauri/binaries/managi-x86_64-pc-windows-msvc.exe" ./cmd/managi
      # generate_context! 宏在编译期嵌入 distDir（../../frontend/dist），需先构建前端。
      - name: Build frontend
        working-directory: frontend
        shell: bash
        run: |
          npm ci
          npm run build
      - name: Verify build inputs
        shell: bash
        run: |
          ls -lh desktop/src-tauri/binaries/managi-x86_64-pc-windows-msvc.exe
          ls -lh frontend/dist/index.html
      - name: Tauri build
        working-directory: desktop/src-tauri
        run: cargo build
      - name: Verify build artifact
        shell: bash
        run: ls -lh desktop/src-tauri/target/debug/managi-desktop.exe
