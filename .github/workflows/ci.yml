# Managi v3 CI: push/PR 触发的 lint + test + build 验证

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-test-go:
    name: Go Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: '1.22'
          cache-dependency-path: backend/go.sum
      - name: Prepare embedded assets for vet/test
        shell: bash
        run: |
          mkdir -p cmd/windows-app
          cp ../desktop/icon.ico cmd/windows-app/icon.ico
          echo '<!DOCTYPE html><html></html>' > cmd/windows-app/index.html
      - name: Go vet
        run: go vet ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          working-directory: backend
          version: v2.6
          args: --timeout=3m
      - name: Go test
        run: go test ./...

  build-go:
    name: Go Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: '1.22'
          cache-dependency-path: backend/go.sum
      - name: Build
        run: CGO_ENABLED=0 GOOS=linux go build -ldflags="-s -w" -o /tmp/managi ./cmd/managi
      - name: Check binary size
        run: ls -lh /tmp/managi

  build-frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        run: npm ci
      - name: Type check
        run: npm run type-check
      - name: Unit tests
        run: npm run test
      - name: Build
        run: npm run build
      - name: Verify single HTML
        run: ls -lh dist/index.html

  build-windows-app:
    name: Windows App Build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v5
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.22'
          cache-dependency-path: backend/go.sum
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Build frontend
        working-directory: frontend
        shell: bash
        run: |
          npm ci
          npm run build
      - name: Copy embedded assets
        shell: bash
        run: |
          cp frontend/dist/index.html backend/cmd/windows-app/index.html
          cp desktop/icon.ico backend/cmd/windows-app/icon.ico
      - name: Generate Windows resource
        working-directory: backend/cmd/windows-app
        shell: bash
        run: |
          go run github.com/akavel/rsrc@latest -ico icon.ico -arch amd64 -o rsrc_windows_amd64.syso
      - name: Build windows-app.exe
        working-directory: backend
        shell: bash
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: 0
        run: |
          go build -ldflags="-H=windowsgui -s -w" -o ../desktop/windows-app.exe ./cmd/windows-app
      - name: Verify build artifact
        shell: bash
        run: ls -lh desktop/windows-app.exe
