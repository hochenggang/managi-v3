# Managi v3 Release: tag v* 触发的多平台构建与发布

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-go-binaries:
    name: Go Binaries (${{ matrix.artifact }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          # Linux glibc（Debian/Ubuntu）
          - goos: linux
            goarch: amd64
            artifact: managi-linux-amd64
          - goos: linux
            goarch: arm64
            artifact: managi-linux-arm64
          # Linux musl（Alpine）— CGO_ENABLED=0 静态二进制，兼容 musl
          - goos: linux
            goarch: amd64
            artifact: managi-linux-amd64-musl
          - goos: linux
            goarch: arm64
            artifact: managi-linux-arm64-musl
          # macOS
          - goos: darwin
            goarch: amd64
            artifact: managi-darwin-amd64
          - goos: darwin
            goarch: arm64
            artifact: managi-darwin-arm64
          # Windows
          - goos: windows
            goarch: amd64
            artifact: managi-windows-amd64
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: '1.22'
          cache-dependency-path: backend/go.sum
      - name: Build
        working-directory: backend
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p ../artifacts
          ext=""
          [ "$GOOS" = "windows" ] && ext=".exe"
          go build -ldflags="-s -w" -o "../artifacts/${{ matrix.artifact }}${ext}" ./cmd/managi
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: artifacts/

  build-frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Build
        working-directory: frontend
        run: |
          npm ci
          npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  build-windows-app:
    name: Windows App
    needs: build-frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: '1.22'
          cache-dependency-path: backend/go.sum
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
      - name: Copy embedded assets
        shell: bash
        run: |
          cp frontend/dist/index.html backend/cmd/windows-app/index.html
          cp desktop/icon.ico backend/cmd/windows-app/icon.ico
      - name: Generate Windows resource
        working-directory: backend/cmd/windows-app
        shell: bash
        run: |
          go run github.com/akavel/rsrc@latest -ico icon.ico -arch amd64 -o rsrc_windows_amd64.syso
      - name: Build windows-app.exe
        working-directory: backend
        shell: bash
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: 0
        run: |
          mkdir -p ../artifacts
          go build -ldflags="-H=windowsgui -s -w" -o "../artifacts/windows-app.exe" ./cmd/windows-app
      - uses: actions/upload-artifact@v4
        with:
          name: windows-app
          path: artifacts/windows-app.exe

  release:
    name: Publish Release
    needs: [build-go-binaries, build-frontend, build-windows-app]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
      - name: List assets
        run: find release-assets -type f
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/managi-*/*
            release-assets/frontend-dist/index.html
            release-assets/windows-app/windows-app.exe
            deploy/install.sh
